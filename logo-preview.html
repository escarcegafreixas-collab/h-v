<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Logo Hugo Vignola</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; gap: 60px;
    padding: 60px 40px;
    background: #09090f;
    color: #f0f0f8;
  }
  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 4px;
    text-transform: uppercase; color: #404058;
  }
  .row {
    display: flex; gap: 48px; align-items: center;
  }
  .card {
    display: flex; flex-direction: column;
    align-items: center; gap: 20px;
  }
  .box {
    width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 20px; border: 1px solid #1f1f32;
  }
  .box.dark  { background: #111118; }
  .box.light { background: #f5f5f7; }
  .box.black { background: #000000; }
  .with-name {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .name-dark {
    font-size: 22px; font-weight: 600; letter-spacing: 1px; color: #111111;
  }
  .name-light {
    font-size: 22px; font-weight: 600; letter-spacing: 1px; color: #f5f5f7;
  }
  .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  }
  .sub.dark  { color: #555555; }
  .sub.light { color: #888888; }
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 2px;
    color: #404058; text-transform: uppercase;
  }
  .divider { width: 600px; height: 1px; background: #1f1f32; }
  .section {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 4px;
    color: #ff2d78; text-transform: uppercase;
    align-self: flex-start; max-width: 700px; width: 700px;
  }
</style>
</head>
<body>

<h1>Hugo Vignola · Logo vectorial</h1>

<div class="section">Solo logo</div>

<div class="row">
  <div class="card">
    <div class="box dark">
      <img src="hugo-vignola-logo-white.svg" width="140" height="140">
    </div>
    <div class="label">Blanco / fondo oscuro</div>
  </div>
  <div class="card">
    <div class="box light">
      <img src="hugo-vignola-logo-dark.svg" width="140" height="140">
    </div>
    <div class="label">Negro / fondo claro</div>
  </div>
  <div class="card">
    <div class="box black">
      <img src="hugo-vignola-logo-white.svg" width="140" height="140">
    </div>
    <div class="label">Blanco / fondo negro</div>
  </div>
</div>

<div class="divider"></div>
<div class="section">Logo + nombre</div>

<div class="row">
  <div class="card">
    <div class="box dark" style="width:320px; flex-direction:row; gap:18px;">
      <img src="hugo-vignola-logo-white.svg" width="70" height="70">
      <div class="with-name">
        <span class="name-light">Hugo Vignola</span>
        <span class="sub light">Producción de eventos</span>
      </div>
    </div>
    <div class="label">Horizontal / oscuro</div>
  </div>
  <div class="card">
    <div class="box light" style="width:320px; flex-direction:row; gap:18px;">
      <img src="hugo-vignola-logo-dark.svg" width="70" height="70">
      <div class="with-name">
        <span class="name-dark">Hugo Vignola</span>
        <span class="sub dark">Producción de eventos</span>
      </div>
    </div>
    <div class="label">Horizontal / claro</div>
  </div>
</div>

</body>
</html>
