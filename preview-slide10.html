<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview Slide 10</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #09090e; color: #f0f0f5; font-family: 'Space Grotesk', sans-serif; }
  :root {
    --surface: #111119; --border: #242434; --text-muted: #9090a8;
    --accent: #D4A847; --accent-dark: rgba(212,168,71,0.08);
  }
  .slide {
    min-height: 100vh; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 60px 80px; position: relative; overflow: hidden;
    text-align: center;
  }
  .section-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 4px; text-transform: uppercase; color: var(--accent);
    margin-bottom: 14px; display: block;
  }
  h2 { font-size: 42px; font-weight: 700; letter-spacing: -1.5px; margin-bottom: 40px; line-height: 1.15; }
  .highlight { color: var(--accent); }
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 16px; margin-top: 12px; max-width: 960px; width: 100%;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px 20px; text-align: center;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at center top, var(--accent-dark), transparent 70%);
  }
  .stat-num {
    font-family: 'JetBrains Mono', monospace; font-size: 38px;
    font-weight: 700; color: var(--accent); line-height: 1;
    margin-bottom: 8px; position: relative;
  }
  .stat-label { font-size: 13px; color: var(--text-muted); line-height: 1.4; position: relative; }
  .slide-num {
    position: absolute; top: 32px; right: 44px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: rgba(240,240,245,0.35); letter-spacing: 1px; z-index: 3;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="slide-num">10 / 12</div>
  <video autoplay muted loop playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;filter:contrast(1.2) brightness(0.9);">
    <source src="slide10_gente.mp4" type="video/mp4">
  </video>
  <div style="position:absolute;inset:0;background:rgba(9,9,14,0.78);z-index:1;"></div>
  <div style="max-width:960px;width:100%;position:relative;z-index:2;">
    <div class="section-label">Los números</div>
    <h2>Lo que entregamos<br>en <span class="highlight">números reales</span></h2>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num">+430K</div>
        <div class="stat-label">personas<br>en total</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">100%</div>
        <div class="stat-label">paquete<br>completo</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">0</div>
        <div class="stat-label">incidentes<br>de seguridad</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">$334</div>
        <div class="stat-label">generados en la economía local<br>por cada $100 invertido en el evento</div>
      </div>
    </div>
    <p style="margin-top:32px;font-family:'Newsreader',serif;font-style:italic;font-size:19px;color:#9090a8;">Más de 430,000 personas. Cero incidentes. Una sola empresa detrás de todo.</p>
  </div>
</div>
</body>
</html>
